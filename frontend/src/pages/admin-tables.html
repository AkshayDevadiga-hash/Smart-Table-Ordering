<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tables & QR Codes — TableOrder</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .table-card-top { display: flex; align-items: flex-start; justify-content: space-between; width: 100%; }
    .table-num { font-size: 1.125rem; font-family: 'Playfair Display', serif; font-weight: 700; }
    .table-seats { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .qr-wrap img { border-radius: 8px; border: 1px solid var(--border); width: 160px; height: 160px; }
    .qr-dl { font-size: 0.75rem; color: var(--text-muted); cursor: pointer; text-decoration: underline; background: none; border: none; }
    .qr-dl:hover { color: var(--primary); }
    .table-preview { font-size: 0.75rem; color: var(--primary); cursor: pointer; text-decoration: underline; background: none; border: none; }
    .table-preview:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-brand-icon">🍽️</span>
        <span class="sidebar-brand-name">TableOrder</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin" class="sidebar-link"><span class="sidebar-link-icon">📊</span>Dashboard</a>
        <a href="/admin/menu" class="sidebar-link"><span class="sidebar-link-icon">🍛</span>Menu</a>
        <a href="/admin/tables" class="sidebar-link active"><span class="sidebar-link-icon">🔲</span>Tables</a>
        <a href="/admin/reports" class="sidebar-link"><span class="sidebar-link-icon">📈</span>Reports</a>
        <a href="/kitchen" class="sidebar-link"><span class="sidebar-link-icon">👨‍🍳</span>Kitchen</a>
      </nav>
      <button class="sidebar-logout" onclick="logout('/admin/login')">↩ Sign Out</button>
    </aside>

    <div class="admin-mobile-nav">
      <a href="/admin" class="mobile-nav-link"><span>📊</span><small>Dashboard</small></a>
      <a href="/admin/menu" class="mobile-nav-link"><span>🍛</span><small>Menu</small></a>
      <a href="/admin/tables" class="mobile-nav-link active"><span>🔲</span><small>Tables</small></a>
      <a href="/admin/reports" class="mobile-nav-link"><span>📈</span><small>Reports</small></a>
      <a href="/kitchen" class="mobile-nav-link"><span>👨‍🍳</span><small>Kitchen</small></a>
    </div>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Tables & QR Codes</h1>
        <button class="btn btn-primary btn-sm" onclick="openAddTable()">+ Add Table</button>
      </div>

      <div class="admin-content">
        <div class="stats-grid" style="margin-bottom:1.5rem" id="tableSummary">
          <div class="card skeleton" style="height:72px"></div>
          <div class="card skeleton" style="height:72px"></div>
          <div class="card skeleton" style="height:72px"></div>
        </div>
        <div class="tables-grid" id="tablesGrid">
          <div class="skeleton" style="height:280px;border-radius:16px"></div>
          <div class="skeleton" style="height:280px;border-radius:16px"></div>
          <div class="skeleton" style="height:280px;border-radius:16px"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Table Modal -->
  <div class="modal-overlay hidden" id="addModal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header">
        <h2>Add New Table</h2>
        <button class="btn-icon" onclick="closeModal()">✕</button>
      </div>
      <form onsubmit="submitTable(event)">
        <div class="modal-body" style="display:flex;flex-direction:column;gap:1rem">
          <div class="form-group" style="display:flex;flex-direction:column;gap:0.375rem">
            <label class="form-label" for="tNumber">Table Number</label>
            <input class="form-input" id="tNumber" type="number" placeholder="e.g. 11" required min="1" />
          </div>
          <div class="form-group" style="display:flex;flex-direction:column;gap:0.375rem">
            <label class="form-label" for="tCapacity">Capacity</label>
            <input class="form-input" id="tCapacity" type="number" placeholder="4" min="1" value="4" required />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" style="flex:1" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex:1" id="addTableBtn">Add Table</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/config.js"></script>
  <script src="/api-base.js"></script>
  <script src="/js/auth.js"></script>
  <script>requireAdminAuth();</script>
  <script src="/js/admin-tables.js"></script>
</body>
</html>
