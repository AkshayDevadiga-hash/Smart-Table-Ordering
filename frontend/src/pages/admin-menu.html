<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Management — Saffron House</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .item-row { display: flex; align-items: center; gap: 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 0.875rem 1rem; margin-bottom: 0.5rem; }
    .item-row.unavailable { opacity: 0.55; }
    .item-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; background: var(--primary-light); }
    .item-thumb-placeholder { width: 48px; height: 48px; border-radius: 8px; border: 1px solid var(--border); flex-shrink: 0; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; }
    .item-row-info { flex: 1; min-width: 0; }
    .item-row-name { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.9rem; }
    .item-row-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-price { font-weight: 700; font-size: 0.9rem; color: var(--primary); flex-shrink: 0; }
    .item-actions { display: flex; gap: 0.375rem; flex-shrink: 0; }
    .icon-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; transition: background 0.15s; }
    .icon-btn:hover { background: var(--primary-light); }
    .icon-btn.danger:hover { background: var(--destructive-light); }
    .cat-section { margin-bottom: 2rem; }
    .cat-heading { font-size: 1.25rem; margin-bottom: 0.25rem; }
    .cat-count { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.875rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.375rem; }
    .checkboxes { display: flex; gap: 1.5rem; }
    .unavail-tag { font-size: 0.7rem; background: #f3f4f6; color: #6b7280; padding: 0.15rem 0.5rem; border-radius: 999px; }
    .img-preview { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); display: block; }
    .img-upload-wrap { display: flex; align-items: center; gap: 1rem; }
    .upload-btn { padding: 0.375rem 0.875rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 0.8rem; cursor: pointer; }
    .upload-btn:hover { background: var(--primary-light); }
    .upload-status { font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="/logo.png" alt="Saffron House" style="height:44px;width:auto;max-width:150px" />
      </div>
      <nav class="sidebar-nav">
        <a href="/admin" class="sidebar-link">Dashboard</a>
        <a href="/admin/menu" class="sidebar-link active">Menu</a>
        <a href="/admin/tables" class="sidebar-link">Tables</a>
        <a href="/admin/reports" class="sidebar-link">Reports</a>
        <a href="/admin/reviews" class="sidebar-link">Reviews</a>
        <a href="/kitchen" class="sidebar-link">Kitchen</a>
      </nav>
      <button class="sidebar-logout" onclick="logout('/admin/login')">↩ Sign Out</button>
    </aside>

    <div class="admin-mobile-nav">
      <a href="/admin" class="mobile-nav-link">Dashboard</a>
      <a href="/admin/menu" class="mobile-nav-link active">Menu</a>
      <a href="/admin/tables" class="mobile-nav-link">Tables</a>
      <a href="/admin/reports" class="mobile-nav-link">Reports</a>
      <a href="/admin/reviews" class="mobile-nav-link">Reviews</a>
      <a href="/kitchen" class="mobile-nav-link">Kitchen</a>
    </div>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Menu Management</h1>
        <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add Item</button>
      </div>

      <div class="admin-content">
        <div class="tab-bar" id="catFilter" style="margin-bottom:1.5rem"></div>
        <div id="menuBody">
          <div class="skeleton" style="height:64px;margin-bottom:0.5rem;border-radius:12px"></div>
          <div class="skeleton" style="height:64px;margin-bottom:0.5rem;border-radius:12px"></div>
          <div class="skeleton" style="height:64px;border-radius:12px"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Form Modal -->
  <div class="modal-overlay hidden" id="formModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Menu Item</h2>
        <button class="btn-icon" onclick="closeForm()">✕</button>
      </div>
      <form id="itemForm" onsubmit="submitForm(event)">
        <div class="modal-body" style="display:flex;flex-direction:column;gap:1rem">
          <div class="form-group">
            <label class="form-label" for="fCategory">Category</label>
            <select class="form-select" id="fCategory" required></select>
          </div>
          <div class="form-group">
            <label class="form-label" for="fName">Name</label>
            <input class="form-input" id="fName" type="text" placeholder="Item name" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="fDesc">Description</label>
            <textarea class="form-textarea" id="fDesc" placeholder="Optional description"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Item Image</label>
            <div class="img-upload-wrap">
              <img id="imgPreview" class="img-preview" src="" alt="Preview" style="display:none" />
              <div>
                <label class="upload-btn" for="fImageFile">📷 Choose Image</label>
                <input type="file" id="fImageFile" accept="image/*" style="display:none" onchange="handleImageSelect()" />
                <input type="hidden" id="fImageUrl" />
                <div class="upload-status" id="uploadStatus"></div>
              </div>
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="fPrice">Price (₹)</label>
              <input class="form-input" id="fPrice" type="number" step="0.01" min="0" placeholder="0.00" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="fSort">Sort Order</label>
              <input class="form-input" id="fSort" type="number" value="0" />
            </div>
          </div>
          <div class="checkboxes">
            <label class="checkbox-label"><input type="checkbox" id="fVeg" /> 🌿 Vegetarian</label>
            <label class="checkbox-label"><input type="checkbox" id="fAvailable" checked /> Available</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" style="flex:1" onclick="closeForm()">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex:1" id="submitBtn">Add Item</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/config.js"></script>
  <script src="/api-base.js"></script>
  <script src="/js/auth.js"></script>
  <script>requireAdminAuth();</script>
  <script src="/js/admin-menu.js"></script>
</body>
</html>
