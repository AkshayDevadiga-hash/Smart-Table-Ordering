<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Saffron House</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .stat-card { display: flex; gap: 1rem; align-items: flex-start; padding: 1.25rem 1.5rem; }
    .stat-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; }
    .stat-num { font-size: 1.875rem; font-weight: 700; line-height: 1.2; }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); }
    .two-col { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    .panel { padding: 1.5rem; }
    .panel-title { font-size: 1.125rem; margin-bottom: 1rem; }
    .order-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .order-row:last-child { border-bottom: none; }
    .order-row-info { flex: 1; min-width: 0; }
    .order-row-num { font-weight: 600; font-size: 0.875rem; }
    .order-row-sub { font-size: 0.75rem; color: var(--text-muted); }
    .order-row-total { font-weight: 700; font-size: 0.875rem; flex-shrink: 0; }
    .popular-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0; border-bottom: 1px solid var(--border); }
    .popular-item:last-child { border-bottom: none; }
    .popular-rank { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .popular-name { flex: 1; font-size: 0.875rem; font-weight: 500; }
    .popular-count { font-size: 0.8rem; color: var(--text-muted); }
    .no-data { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="/logo.png" alt="Saffron House" style="height:38px;width:auto;max-width:150px; margin-left: 30px;" />
      </div>
      <nav class="sidebar-nav">
        <a href="/admin" class="sidebar-link active">Dashboard</a>
        <a href="/admin/menu" class="sidebar-link">Menu</a>
        <a href="/admin/tables" class="sidebar-link">Tables</a>
        <a href="/admin/reports" class="sidebar-link">Reports</a>
        <a href="/admin/reviews" class="sidebar-link">Reviews</a>
        <a href="/kitchen" class="sidebar-link">Kitchen</a>
      </nav>
      <button class="sidebar-logout" onclick="logout('/admin/login')">↩ Sign Out</button>
    </aside>

    <div class="admin-mobile-nav">
      <a href="/admin" class="mobile-nav-link active">Dashboard</a>
      <a href="/admin/menu" class="mobile-nav-link">Menu</a>
      <a href="/admin/tables" class="mobile-nav-link">Tables</a>
      <a href="/admin/reports" class="mobile-nav-link">Reports</a>
      <a href="/admin/reviews" class="mobile-nav-link">Reviews</a>
      <a href="/kitchen" class="mobile-nav-link">Kitchen</a>
    </div>

    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-page-title">Dashboard</h1>
        <button class="btn btn-outline btn-sm" onclick="logout('/admin/login')">Sign Out</button>
      </div>

      <div class="admin-content">
        <div class="stats-grid" id="statsGrid">
          <div class="card skeleton" style="height:100px"></div>
          <div class="card skeleton" style="height:100px"></div>
          <div class="card skeleton" style="height:100px"></div>
          <div class="card skeleton" style="height:100px"></div>
        </div>

        <div class="two-col">
          <div class="card panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
              <h2 class="panel-title" style="margin:0">Recent Orders</h2>
              <span style="font-size:0.75rem;color:var(--text-muted)">Last 20 orders</span>
            </div>
            <div id="recentOrders">
              <div class="skeleton" style="height:48px;margin-bottom:0.5rem"></div>
              <div class="skeleton" style="height:48px;margin-bottom:0.5rem"></div>
            </div>
          </div>
          <div class="card panel">
            <h2 class="panel-title">Popular Items</h2>
            <div id="popularItems"><div class="skeleton" style="height:36px;margin-bottom:0.5rem"></div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/config.js"></script>
  <script src="/api-base.js"></script>
  <script src="/js/auth.js"></script>
  <script>requireAdminAuth();</script>
  <script src="/js/admin.js"></script>
</body>
</html>
