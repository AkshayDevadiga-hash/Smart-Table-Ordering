openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Smart Restaurant Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: menu
    description: Menu management
  - name: orders
    description: Order management
  - name: tables
    description: Table management
  - name: kitchen
    description: Kitchen dashboard
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /menu/categories:
    get:
      operationId: getMenuCategories
      tags: [menu]
      summary: Get all menu categories
      responses:
        "200":
          description: List of menu categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"
    post:
      operationId: createMenuCategory
      tags: [menu]
      summary: Create a new menu category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"

  /menu/categories/{categoryId}:
    put:
      operationId: updateMenuCategory
      tags: [menu]
      summary: Update a menu category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuCategory"
    delete:
      operationId: deleteMenuCategory
      tags: [menu]
      summary: Delete a menu category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /menu/items:
    get:
      operationId: getMenuItems
      tags: [menu]
      summary: Get all menu items
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create a new menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemBody"
      responses:
        "201":
          description: Created menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /menu/items/{itemId}:
    put:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update a menu item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemBody"
      responses:
        "200":
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete a menu item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tables:
    get:
      operationId: getTables
      tags: [tables]
      summary: Get all tables
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a new table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableBody"
      responses:
        "201":
          description: Created table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /tables/{tableId}:
    get:
      operationId: getTable
      tags: [tables]
      summary: Get table by ID
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Table details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get all orders
      parameters:
        - name: tableId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, received, preparing, ready, delivered, completed, cancelled]
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}/bill:
    get:
      operationId: getOrderBill
      tags: [orders]
      summary: Get the bill for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"

  /kitchen/active-orders:
    get:
      operationId: getKitchenActiveOrders
      tags: [kitchen]
      summary: Get all active kitchen orders (pending/received/preparing/ready)
      responses:
        "200":
          description: Active kitchen orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [admin]
      summary: Get recent orders for admin
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MenuCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - sortOrder
        - createdAt

    CreateMenuCategoryBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
      required:
        - name
        - sortOrder

    MenuItem:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
        imageUrl:
          type: string
          nullable: true
        isAvailable:
          type: boolean
        isVeg:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - categoryId
        - name
        - price
        - isAvailable
        - isVeg
        - sortOrder
        - createdAt

    CreateMenuItemBody:
      type: object
      properties:
        categoryId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: string
        imageUrl:
          type: string
          nullable: true
        isAvailable:
          type: boolean
        isVeg:
          type: boolean
        sortOrder:
          type: integer
      required:
        - categoryId
        - name
        - price
        - isAvailable
        - isVeg
        - sortOrder

    Table:
      type: object
      properties:
        id:
          type: integer
        tableNumber:
          type: integer
        capacity:
          type: integer
        status:
          type: string
          enum: [available, occupied, reserved]
        qrCode:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tableNumber
        - capacity
        - status
        - qrCode
        - createdAt

    CreateTableBody:
      type: object
      properties:
        tableNumber:
          type: integer
        capacity:
          type: integer
      required:
        - tableNumber
        - capacity

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        menuItemId:
          type: integer
        menuItemName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: string
        specialInstructions:
          type: string
          nullable: true
      required:
        - id
        - orderId
        - menuItemId
        - menuItemName
        - quantity
        - unitPrice

    Order:
      type: object
      properties:
        id:
          type: integer
        tableId:
          type: integer
        tableNumber:
          type: integer
        status:
          type: string
          enum: [pending, received, preparing, ready, delivered, completed, cancelled]
        subtotal:
          type: string
        tax:
          type: string
        total:
          type: string
        specialInstructions:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - tableId
        - tableNumber
        - status
        - subtotal
        - tax
        - total
        - items
        - createdAt
        - updatedAt

    CreateOrderItemBody:
      type: object
      properties:
        menuItemId:
          type: integer
        quantity:
          type: integer
        specialInstructions:
          type: string
          nullable: true
      required:
        - menuItemId
        - quantity

    CreateOrderBody:
      type: object
      properties:
        tableId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateOrderItemBody"
        specialInstructions:
          type: string
          nullable: true
      required:
        - tableId
        - items

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, received, preparing, ready, delivered, completed, cancelled]
      required:
        - status

    Bill:
      type: object
      properties:
        orderId:
          type: integer
        tableNumber:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotal:
          type: string
        taxRate:
          type: string
        tax:
          type: string
        total:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - orderId
        - tableNumber
        - items
        - subtotal
        - taxRate
        - tax
        - total
        - status
        - createdAt

    AdminStats:
      type: object
      properties:
        totalOrdersToday:
          type: integer
        totalRevenueToday:
          type: string
        activeOrders:
          type: integer
        tablesOccupied:
          type: integer
        totalTables:
          type: integer
        popularItems:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
      required:
        - totalOrdersToday
        - totalRevenueToday
        - activeOrders
        - tablesOccupied
        - totalTables
        - popularItems
