kind = "web"
  previewPath = "/"
  title = "Smart Restaurant Management"
  version = "1.0.0"
  id = "artifacts/restaurant"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 18641

  [services.development]
  run = "pnpm --filter @workspace/restaurant run dev"

  [services.production]
  build = [ "sh", "-c", "pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/restaurant run build" ]
  run = [ "sh", "-c", "PORT=8080 pnpm --filter @workspace/api-server run start & pnpm --filter @workspace/restaurant run serve" ]

  [services.env]
  PORT = "18641"
  BASE_PATH = "/"
  