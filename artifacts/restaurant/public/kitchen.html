<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Dashboard — TableOrder</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .kitchen-header-inner { max-width: 1400px; }
    .columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
    @media (max-width: 1100px) { .columns { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .columns { grid-template-columns: 1fr; } }
    .col-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; border-radius: 12px 12px 0 0; font-weight: 700; font-size: 0.875rem; border-bottom: 2px solid; }
    .col-body { display: flex; flex-direction: column; gap: 0.75rem; padding: 0.75rem; min-height: 200px; background: #f9f6f2; border-radius: 0 0 12px 12px; border: 1px solid var(--border); border-top: none; }
    .order-ticket { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; box-shadow: var(--shadow); }
    .ticket-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .ticket-table { font-weight: 700; font-size: 0.9375rem; }
    .ticket-time { font-size: 0.72rem; color: var(--text-muted); }
    .ticket-items { font-size: 0.8125rem; }
    .ticket-item-line { display: flex; gap: 0.375rem; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
    .ticket-item-line:last-child { border-bottom: none; }
    .ticket-qty { font-weight: 700; color: var(--primary); min-width: 24px; }
    .ticket-note { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.625rem; padding: 0.5rem; background: var(--primary-light); border-radius: 6px; }
    .ticket-actions { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .status-btn { font-size: 0.78rem; padding: 0.375rem 0.875rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
    .status-btn:hover { opacity: 0.85; }
    .col-pending .col-header { background: #fef9c3; color: #854d0e; border-color: #fde047; }
    .col-received .col-header { background: #dbeafe; color: #1e40af; border-color: #93c5fd; }
    .col-preparing .col-header { background: #fed7aa; color: #c2410c; border-color: #fb923c; }
    .col-ready .col-header { background: #d1fae5; color: #065f46; border-color: #34d399; }
    .empty-col { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.8rem; }
    .col-count { font-size: 0.7rem; background: rgba(0,0,0,0.12); border-radius: 999px; padding: 0.15rem 0.5rem; }
    .refresh-indicator { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.375rem; }
    .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header-inner kitchen-header-inner">
      <div class="page-header-title">
        <a href="/admin" class="back-btn">←</a>
        <span>👨‍🍳</span>
        Kitchen Dashboard
      </div>
      <div class="refresh-indicator">
        <div class="live-dot"></div>
        <span>Live</span>
      </div>
    </div>
  </header>

  <div id="boardRoot">
    <div style="text-align:center;padding:3rem;color:var(--text-muted)">Loading orders…</div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    let orders = [];

    function showToast(msg, error) {
      const el = document.createElement('div');
      el.className = 'toast' + (error ? ' error' : '');
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function api(path, opts) {
      const res = await fetch('/api' + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
      if (!res.ok) throw new Error(await res.text());
      if (res.status === 204) return null;
      return res.json();
    }

    function timeAgo(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      return Math.floor(diff / 3600) + 'h ago';
    }

    const COLUMNS = [
      { key: 'pending', label: 'Pending', next: [{ to:'received', label:'Accept' }, { to:'cancelled', label:'Cancel', style:'color:var(--destructive);background:var(--destructive-light)' }] },
      { key: 'received', label: 'Received', next: [{ to:'preparing', label:'Start Preparing', style:'background:var(--primary);color:#fff' }] },
      { key: 'preparing', label: 'Preparing', next: [{ to:'ready', label:'Mark Ready', style:'background:var(--secondary);color:#fff' }] },
      { key: 'ready', label: 'Ready ✓', next: [{ to:'delivered', label:'Mark Delivered', style:'background:#6b7280;color:#fff' }] },
    ];

    async function updateStatus(orderId, status) {
      try {
        await api('/orders/' + orderId, { method: 'PATCH', body: JSON.stringify({ status }) });
        await loadOrders();
        showToast('Status updated to ' + status);
      } catch {
        showToast('Failed to update status', true);
      }
    }

    function renderTicket(order) {
      const actionBtns = (() => {
        const col = COLUMNS.find(c => c.key === order.status);
        if (!col) return '';
        return col.next.map(n =>
          `<button class="status-btn" style="${n.style || 'background:var(--primary-light);color:var(--primary)'}" onclick="updateStatus(${order.id},'${n.to}')">${n.label}</button>`
        ).join('');
      })();

      const itemLines = (order.items || []).map(i =>
        `<div class="ticket-item-line"><span class="ticket-qty">${i.quantity}×</span><span>${i.menuItemName}</span></div>`
      ).join('');

      return `
        <div class="order-ticket">
          <div class="ticket-header">
            <div>
              <div class="ticket-table">Table ${order.tableNumber}</div>
              <div class="ticket-time">Order #${order.id} · ${timeAgo(order.createdAt)}</div>
            </div>
          </div>
          <div class="ticket-items">${itemLines}</div>
          ${order.specialInstructions ? `<div class="ticket-note">📝 ${order.specialInstructions}</div>` : ''}
          <div class="ticket-actions">${actionBtns}</div>
        </div>
      `;
    }

    function renderBoard() {
      const root = document.getElementById('boardRoot');
      root.innerHTML = '<div class="columns">' + COLUMNS.map(col => {
        const colOrders = orders.filter(o => o.status === col.key);
        return `
          <div class="col-${col.key}">
            <div class="col-header">
              <span>${col.label}</span>
              <span class="col-count">${colOrders.length}</span>
            </div>
            <div class="col-body">
              ${colOrders.length === 0
                ? '<div class="empty-col">No orders</div>'
                : colOrders.map(renderTicket).join('')
              }
            </div>
          </div>
        `;
      }).join('') + '</div>';
    }

    async function loadOrders() {
      try {
        orders = await api('/kitchen/active-orders');
        renderBoard();
      } catch {
        if (!orders.length) {
          document.getElementById('boardRoot').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted)">Failed to load orders.</div>';
        }
      }
    }

    loadOrders();
    setInterval(loadOrders, 5000);
  </script>
</body>
</html>
