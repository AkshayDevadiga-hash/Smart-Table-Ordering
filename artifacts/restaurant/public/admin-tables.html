<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tables & QR Codes — TableOrder</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .tables-content { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .table-card-top { display: flex; align-items: flex-start; justify-content: space-between; width: 100%; }
    .table-num { font-size: 1.125rem; font-family: 'Playfair Display', serif; font-weight: 700; }
    .table-seats { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .qr-wrap img { border-radius: 8px; border: 1px solid var(--border); width: 160px; height: 160px; }
    .qr-dl { font-size: 0.75rem; color: var(--text-muted); cursor: pointer; text-decoration: underline; background: none; border: none; }
    .qr-dl:hover { color: var(--primary); }
    .table-preview { font-size: 0.75rem; color: var(--primary); cursor: pointer; text-decoration: underline; background: none; border: none; }
    .table-preview:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="page-header-inner">
      <div class="page-header-title">
        <a href="/admin" class="back-btn">←</a>
        <span>🔲</span>
        Tables & QR Codes
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddTable()">+ Add Table</button>
    </div>
  </header>

  <div class="tables-content">
    <div class="stats-grid" style="margin-bottom:1.5rem" id="tableSummary">
      <div class="card skeleton" style="height:72px"></div>
      <div class="card skeleton" style="height:72px"></div>
      <div class="card skeleton" style="height:72px"></div>
    </div>
    <div class="tables-grid" id="tablesGrid">
      <div class="skeleton" style="height:280px;border-radius:16px"></div>
      <div class="skeleton" style="height:280px;border-radius:16px"></div>
      <div class="skeleton" style="height:280px;border-radius:16px"></div>
    </div>
  </div>

  <!-- Add Table Modal -->
  <div class="modal-overlay hidden" id="addModal">
    <div class="modal" style="max-width:380px">
      <div class="modal-header">
        <h2>Add New Table</h2>
        <button class="btn-icon" onclick="closeModal()">✕</button>
      </div>
      <form onsubmit="submitTable(event)">
        <div class="modal-body" style="display:flex;flex-direction:column;gap:1rem">
          <div class="form-group" style="display:flex;flex-direction:column;gap:0.375rem">
            <label class="form-label" for="tNumber">Table Number</label>
            <input class="form-input" id="tNumber" type="number" placeholder="e.g. 11" required min="1" />
          </div>
          <div class="form-group" style="display:flex;flex-direction:column;gap:0.375rem">
            <label class="form-label" for="tCapacity">Capacity</label>
            <input class="form-input" id="tCapacity" type="number" placeholder="4" min="1" value="4" required />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" style="flex:1" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex:1" id="addTableBtn">Add Table</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    let tables = [];

    function showToast(msg, error) {
      const el = document.createElement('div');
      el.className = 'toast' + (error ? ' error' : '');
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    async function api(path, opts) {
      const res = await fetch('/api' + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
      if (!res.ok) throw new Error(await res.text());
      if (res.status === 204) return null;
      return res.json();
    }

    async function load() {
      try {
        tables = await api('/tables');
        renderSummary();
        renderTables();
      } catch {
        document.getElementById('tablesGrid').innerHTML = '<p style="color:var(--text-muted)">Failed to load tables.</p>';
      }
    }

    function renderSummary() {
      const available = tables.filter(t => t.status === 'available').length;
      const occupied = tables.filter(t => t.status === 'occupied').length;
      document.getElementById('tableSummary').innerHTML = `
        <div class="card" style="padding:1rem 1.25rem;text-align:center">
          <div style="font-size:1.5rem;font-weight:700">${tables.length}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">Total Tables</div>
        </div>
        <div class="card" style="padding:1rem 1.25rem;text-align:center">
          <div style="font-size:1.5rem;font-weight:700;color:var(--secondary)">${available}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">Available</div>
        </div>
        <div class="card" style="padding:1rem 1.25rem;text-align:center">
          <div style="font-size:1.5rem;font-weight:700;color:var(--primary)">${occupied}</div>
          <div style="font-size:0.75rem;color:var(--text-muted)">Occupied</div>
        </div>
      `;
    }

    function statusBadge(status) {
      const map = { available: 'badge-green', occupied: 'badge-orange', reserved: 'badge-yellow' };
      return `<span class="badge ${map[status] || 'badge-gray'}">${status.charAt(0).toUpperCase()+status.slice(1)}</span>`;
    }

    function renderTables() {
      const grid = document.getElementById('tablesGrid');
      if (!tables.length) {
        grid.innerHTML = '<div class="empty-state"><h3>No Tables Yet</h3><p>Add your first table to generate QR codes.</p><button class="btn btn-primary" onclick="openAddTable()">Add First Table</button></div>';
        return;
      }
      grid.innerHTML = tables.map(t => {
        const menuUrl = encodeURIComponent(window.location.origin + '/menu/' + t.id);
        const qrSrc = '/qr?url=' + menuUrl;
        return `
          <div class="table-card">
            <div class="table-card-top">
              <div>
                <div class="table-num">Table ${t.tableNumber}</div>
                <div class="table-seats">🪑 ${t.capacity} seats</div>
              </div>
              ${statusBadge(t.status)}
            </div>
            <div class="qr-wrap">
              <img src="${qrSrc}" alt="QR Code for Table ${t.tableNumber}" />
              <a class="qr-dl" href="${qrSrc}" download="table-${t.tableNumber}-qr.png">⬇ Download PNG</a>
            </div>
            <button class="table-preview" onclick="window.open('/menu/${t.id}','_blank')">Preview Menu →</button>
          </div>
        `;
      }).join('');
    }

    function openAddTable() {
      document.getElementById('addModal').classList.remove('hidden');
      document.getElementById('tNumber').focus();
    }

    function closeModal() {
      document.getElementById('addModal').classList.add('hidden');
    }

    async function submitTable(e) {
      e.preventDefault();
      const btn = document.getElementById('addTableBtn');
      btn.disabled = true;
      try {
        await api('/tables', {
          method: 'POST',
          body: JSON.stringify({
            tableNumber: parseInt(document.getElementById('tNumber').value, 10),
            capacity: parseInt(document.getElementById('tCapacity').value, 10),
          }),
        });
        closeModal();
        showToast('Table added!');
        await load();
      } catch {
        showToast('Failed to add table', true);
      } finally {
        btn.disabled = false;
        e.target.reset();
        document.getElementById('tCapacity').value = '4';
      }
    }

    document.getElementById('addModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    load();
  </script>
</body>
</html>
